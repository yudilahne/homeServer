services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env:ro
      - ${LARAVEL_STORAGE_PATH:-/DATA/AppData/yudilahne-app/laravel_storage}:/var/www/html/storage
      - ${LARAVEL_CACHE_PATH:-/DATA/AppData/yudilahne-app/laravel_cache}:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: web
    restart: unless-stopped
    depends_on:
      - app
    expose:
      - "80"
    volumes:
      - ${LARAVEL_STORAGE_PATH:-/DATA/AppData/yudilahne-app/laravel_storage}:/var/www/html/storage

  db:
    image: mariadb:11.8
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-yudilahne_app}
      MARIADB_USER: ${DB_USERNAME:-yudilahne}
      MARIADB_PASSWORD: ${DB_PASSWORD:-change-this-password}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-this-root-password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ${MARIADB_DATA_PATH:-/DATA/AppData/yudilahne-app/mariadb_data}:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
